name: CI/CD Pipeline to GHCR

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      # --- PERBAIKAN DI SINI ---
      # Langkah ini mengubah "Daffa-2003/tes-paas" menjadi "daffa-2003/tes-paas"
      - name: Lowercase Repo Name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        if: success()
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: success()
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Gunakan variable env.REPO_LOWER yang sudah dikecilkan hurufnya
          tags: ghcr.io/${{ env.REPO_LOWER }}:latest

      - name: Trigger PaaS Deploy
        if: success()
        run: |
          # Gunakan variable env.REPO_LOWER juga di sini agar sinkron
          curl -X POST -H "Content-Type: application/json" \
          -d '{"image": "ghcr.io/${{ env.REPO_LOWER }}:latest"}' \
          ${{ secrets.PAAS_WEBHOOK_URL }}